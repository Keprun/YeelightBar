<text x="252" y="290" fill="#44D62C">♪</text><text x="276" y="290">Реакция на музыку</text>
<text x="252" y="314" fill="#44D62C">🎭</text><text x="276" y="314">Сцены, темы и 7 языков</text>
<text x="252" y="338" fill="#44D62C">⌨</text><text x="276" y="338">Подсветка клавиатуры Keychron</text>
</g>

