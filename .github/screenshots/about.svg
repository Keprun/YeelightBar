<svg width="100%" viewBox="0 0 900 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>YeelightBar — About</title>
<desc>About screen: animated wordmark, version 0.2.5 and MIT badges, tagline, description, a feature list, and a Project group linking to GitHub, releases and issues.</desc>
<defs><linearGradient id="winA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#171B17"/><stop offset="1" stop-color="#121512"/></linearGradient></defs>
