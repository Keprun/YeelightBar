<text x="22" y="286" font-family="Arial" font-size="12" font-weight="700" letter-spacing="0.8" fill="#44D62C">ⓘ  О ПРОГРАММЕ</text>

<text x="238" y="84" font-family="Arial" font-size="22" font-weight="900" letter-spacing="2" fill="#EAF2E8">⚡ YEELIGHT</text>
<text x="416" y="84" font-family="Arial" font-size="22" font-weight="900" letter-spacing="2" fill="#44D62C">BAR</text>
<rect x="238" y="98" width="96" height="20" rx="5" fill="#1d211d" stroke="#2e332e"/><text x="252" y="112" font-family="monospace" font-size="10" font-weight="700" fill="#8FA889">Версия 0.2.5</text>
<rect x="342" y="98" width="44" height="20" rx="5" fill="#1d211d" stroke="#2e332e"/><text x="352" y="112" font-family="monospace" font-size="10" font-weight="700" fill="#8FA889">MIT</text>
<text x="238" y="138" font-family="Arial" font-size="13" fill="#8FA889">Амбилайт для Yeelight и Keychron на macOS</text>
<text x="238" y="162" font-family="Arial" font-size="12.5" fill="#C7D3C2">Нативное menu-bar приложение: ловит цвет с экрана и в реальном времени</text>
<text x="238" y="180" font-family="Arial" font-size="12.5" fill="#C7D3C2">красит под него лампы Yeelight и клавиатуру Keychron — плюс реакция на</text>
<text x="238" y="198" font-family="Arial" font-size="12.5" fill="#C7D3C2">музыку, сцены и темы.</text>

