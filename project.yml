name: YeelightBar
options:
  bundleIdPrefix: com.vfi
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Debug
targets:
  YeelightBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/YeelightKit
      - path: Sources/YeelightBarApp
    info:
      path: xcode/Info.plist
      properties:
        CFBundleName: YeelightBar
        CFBundleDisplayName: YeelightBar
        LSUIElement: false
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vfi.yeelightbar
        PRODUCT_NAME: YeelightBar
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
